    <style>
        body { 
            font-family: 'Kanit', sans-serif;

            color: #1e293b; 
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent;

        @media (display-mode: standalone) {
            body { padding-top: env(safe-area-inset-top); }
            header { padding-top: 1rem; }
        }

        .glass-panel { background: #ffffff; border-radius: 1rem; box-shadow: 0 4px 15px -3px rgba(0, 0, 0, 0.05); transition: all 0.3s ease; }
        .table-scroll { max-height: 450px; overflow-y: auto; overflow-x: auto; width: 100%; -webkit-overflow-scrolling: touch; }

        .modal-active { display: flex !important; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        #customAlert { display: none; position: fixed; top: 20px; right: 20px; z-index: 9999; animation: slideIn 0.3s ease-out; }
        
        .slot-free { background-color: #ecfdf5; color: #065f46; cursor: pointer; }

        @media print {
            body * { visibility: hidden; }
            .modal-active, .modal-active * { visibility: visible; }
            .modal-active { position: absolute !important; left: 0 !important; top: 0 !important; width: 100% !important; display: block !important; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="p-2 sm:p-4 md:p-8">

    <!-- PWA Registration & Install Script -->
    <script>
        // 1. Dynamic Manifest Generation
        const manifest = {
            "name": "Makmai Tennis Club",
            "short_name": "MakmaiTennis",
            "start_url": "./index.html",
            "display": "standalone",
            "background_color": "#f8fafc",
            "theme_color": "#2563eb",
            "icons": [
                {
                    "src": "https://cdn-icons-png.flaticon.com/512/3135/3135712.png",
                    "sizes": "512x512",
                    "type": "image/png",
                    "purpose": "any maskable"
                }
            ]
        };
        const stringManifest = JSON.stringify(manifest);
        const blob = new Blob([stringManifest], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = manifestURL;
        document.head.appendChild(link);

        // 2. Service Worker Registration (Fixed URL protocol error)
        if ('serviceWorker' in navigator) {
            // เบราว์เซอร์ไม่อนุญาตให้ใช้ Blob URL ในการลงทะเบียน Service Worker เนื่องจากเหตุผลด้านความปลอดภัย
            // จึงเปลี่ยนไปเรียกใช้ไฟล์ sw.js แบบปกติแทน
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => {
                    console.log('ServiceWorker registration skipped. To enable full offline support on GitHub Pages, create an empty "sw.js" file.');
                });
            });
        }
    </script>

    <!-- Notification -->

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

                            <input type="tel" id="inputPhone" name="phoneNumber" placeholder="เบอร์โทร 10 หลัก" required maxlength="10" class="w-full border rounded-lg px-3 py-2 text-sm" oninput="window.autoFillFromPhone(this.value)">

            <!-- Right Column: Schedule -->

                <!-- Grid Visual -->

    <!-- Modals (Re-using logic from original) -->
    <div id="promptModal" class="fixed inset-0 bg-slate-900/80 z-[110] hidden items-center justify-center p-4">

            <input type="password" id="promptInput" class="w-full border rounded-xl px-4 py-2 text-center text-lg mb-4">
            <div class="flex gap-2">
                <button onclick="window.closeModal()" class="flex-1 py-2 bg-slate-100 rounded-xl">ยกเลิก</button>

    <!-- FIREBASE MODULE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config จากโค้ดเดิมของคุณ
        const config = {
            apiKey: "AIzaSyA4ACuJR2m49qx-I56bkO-VIiyMHbnXXSM",
            authDomain: "makmai-tennis-booking.firebaseapp.com",
            projectId: "makmai-tennis-booking",
            storageBucket: "makmai-tennis-booking.firebasestorage.app",
            messagingSenderId: "804008227066",
            appId: "1:804008227066:web:3996d65a9a2585970cd943"
        };

        // Global Variables
        window.isLoggedIn = localStorage.getItem('makmai_session') === 'true';
        window.adminMode = localStorage.getItem('makmai_admin') === 'true';
        window.allBookingsCache = [];
        window.currentFilterWeek = '';
        let db, auth, collectionRef;

        // Utilities
        const thaiMonths = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
        window.getThailandDate = () => new Date().toLocaleDateString('en-CA', {timeZone: 'Asia/Bangkok'});
        window.getThailandHour = () => parseInt(new Date().toLocaleTimeString('en-GB', {timeZone: 'Asia/Bangkok', hour12: false}).split(':')[0]);
        window.getWeekString = (dateStr) => {
            const d = new Date(dateStr);
            d.setHours(0,0,0,0);
            d.setDate(d.getDate() + 4 - (d.getDay() || 7));
            const yearStart = new Date(d.getFullYear(), 0, 1);
            const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            return `${d.getFullYear()}-W${String(weekNo).padStart(2, '0')}`;
        };

        window.showAlert = (msg) => {
            const box = document.getElementById('customAlert');
            document.getElementById('alertMessage').innerText = msg;
            box.style.display = 'flex';
            setTimeout(() => box.style.display = 'none', 3000);
        };

        window.closeModal = () => document.querySelectorAll('.fixed').forEach(m => m.classList.remove('modal-active'));

        // UI Updates
        window.updateLoginUI = () => {
            const lb = document.getElementById('loginBtn');
            const ab = document.getElementById('mainActionButtons');
            const lc = document.getElementById('leftColumn');
            const rc = document.getElementById('rightColumn');

            if (window.isLoggedIn) {
                lb.innerText = "🚪 ออกจากระบบ";
                ab.classList.remove('hidden');
                lc.classList.remove('hidden');
                rc.classList.replace('lg:col-span-12', 'lg:col-span-8');
            } else {
                lb.innerText = "🔐 เข้าสู่ระบบ";
                ab.classList.add('hidden');
                lc.classList.add('hidden'); rc.classList.replace('lg:col-span-8', 'lg:col-span-12');
            }
            window.renderAll();
        };

        window.toggleLogin = async () => {
            if (window.isLoggedIn) {
                localStorage.removeItem('makmai_session'); window.isLoggedIn = false; window.updateLoginUI();
            } else {
                const pass = await window.customPrompt("กรุณาใส่รหัสผ่านสมาชิก:");
                if (pass === "Admin125/000") {
                    localStorage.setItem('makmai_session', 'true'); window.isLoggedIn = true; window.updateLoginUI();
                } else if (pass) window.showAlert("❌ รหัสไม่ถูกต้อง");
            }
        };

        window.customPrompt = (title) => new Promise(res => {
            const m = document.getElementById('promptModal');
            document.getElementById('promptTitle').innerText = title;
            m.classList.add('modal-active');
            document.getElementById('promptSubmitBtn').onclick = () => {
                const val = document.getElementById('promptInput').value;
                m.classList.remove('modal-active'); res(val);
                document.getElementById('promptInput').value = '';
            };
            window.closeModal = () => { m.classList.remove('modal-active'); res(null); };
        });

        // Core Rendering
        window.renderAll = () => {
            window.renderTable();
            window.renderGrid();
            const d = new Date(window.currentFilterWeek.replace('-W', '-01-01')); // Rough calc for display
            document.getElementById('weekDisplay').innerText = `สัปดาห์ปัจจุบัน: ${window.currentFilterWeek}`;
        };

        window.renderTable = () => {
            const body = document.getElementById('bookingTableBody');
            body.innerHTML = '';
            const list = window.allBookingsCache.filter(b => b.week === window.currentFilterWeek);
            if (!list.length) { body.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-slate-400">ไม่มีข้อมูลการจอง</td></tr>'; return; }
            
            list.sort((a,b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time)).forEach((b, i) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-3 text-center font-bold">${i+1}</td>
                    <td class="p-3"><div class="font-bold">${b.customerName}</div><div class="text-[10px]">125/${b.address}</div></td>
                    <td class="p-3"><div class="font-bold">${b.date}</div><div class="text-blue-600">${b.time} (${b.hours} ชม.)</div></td>
                    <td class="p-3 text-right font-black">฿${b.totalPrice}</td>
                    <td class="p-3 text-center ${window.isLoggedIn ? '' : 'hidden'}"><button onclick="window.deleteBooking('${b.id}')" class="text-red-500">ลบ</button></td>
                `;
                body.appendChild(tr);
            });
        };

        window.renderGrid = () => {
            const body = document.getElementById('scheduleGridBody');
            const date = document.getElementById('scheduleDateInput').value;
            body.innerHTML = '';
            for(let h=6; h<=20; h++) {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="p-2 border bg-slate-50 font-bold text-[10px] w-12">${h}:00</td>`;
                ["สนาม 1", "สนาม 2"].forEach(court => {
                    const b = window.allBookingsCache.find(x => x.date === date && x.court === court && h >= parseInt(x.time) && h < parseInt(x.time) + x.hours);
                    const td = document.createElement('td');
                    td.className = `p-1 border text-[10px] ${b ? (b.slip ? 'slot-paid' : 'slot-booked') : 'slot-free'}`;
                    td.innerText = b ? b.customerName : 'ว่าง';
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            }
        };

        // Form Logic
        window.updateHourOptions = () => {
            const start = parseInt(document.getElementById('timeSelect').value);
            const max = Math.min(2, 21 - start);
            let html = '';
            for(let i=1; i<=max; i++) html += `<option value="${i}">${i} ชม.</option>`;
            document.getElementById('hoursSelect').innerHTML = html;
            window.calculateTotal();
        };

        window.calculateTotal = () => {
            const start = parseInt(document.getElementById('timeSelect').value);
            const hrs = parseInt(document.getElementById('hoursSelect').value);
            let total = 0;
            for(let i=0; i<hrs; i++) total += (start+i >= 18) ? 150 : 100;
            document.getElementById('totalPriceDisplay').innerText = `฿${total}`;
        };

        // Form Submit
        document.getElementById('bookingForm').onsubmit = async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const id = Date.now().toString();
            const data = {
                id,
                date: fd.get('date'),
                court: fd.get('court'),
                time: fd.get('time'),
                hours: parseInt(fd.get('hours')),
                customerName: fd.get('customerName'),
                phoneNumber: fd.get('phoneNumber'),
                address: fd.get('address'),
                totalPrice: parseInt(document.getElementById('totalPriceDisplay').innerText.replace('฿','')),
                week: window.getWeekString(fd.get('date')),
                timestamp: Date.now()
            };

            try {
                await setDoc(doc(collectionRef, id), data);
                window.showAlert("✅ จองสำเร็จแล้ว!");
                e.target.reset(); window.renderAll();
            } catch(err) { window.showAlert("❌ บันทึกไม่สำเร็จ"); }
        };

        window.deleteBooking = async (id) => {
            if (confirm("ยืนยันการลบรายการนี้?")) {
                await deleteDoc(doc(collectionRef, id));
                window.showAlert("ลบข้อมูลแล้ว");
            }
        };

        window.navigateWeek = (dir) => {
            const d = new Date(window.currentFilterWeek.replace('-W', '-01-01'));
            d.setDate(d.getDate() + (dir * 7));
            window.currentFilterWeek = window.getWeekString(d.toLocaleDateString('en-CA'));
            window.renderAll();
        };

        window.goToCurrentWeek = () => {
            window.currentFilterWeek = window.getWeekString(window.getThailandDate());
            window.renderAll();
        };

        // Initialization
        const init = async () => {
            try {
                const app = initializeApp(config);
                db = getFirestore(app);
                auth = getAuth(app);
                collectionRef = collection(db, 'bookings');
                await signInAnonymously(auth);

                onSnapshot(collectionRef, (snap) => {
                    window.allBookingsCache = [];
                    snap.forEach(d => window.allBookingsCache.push(d.data()));
                    window.renderAll();
                });

                // Setup Datepickers
                flatpickr("#dateInput", { locale: 'th', defaultDate: window.getThailandDate() });
                flatpickr("#scheduleDateInput", { 
                    locale: 'th', 
                    defaultDate: window.getThailandDate(),
                    onChange: () => window.renderGrid()
                });

                // Setup Time
                let tHtml = ''; for(let i=6; i<=20; i++) tHtml += `<option value="${i}:00">${i}:00</option>`;
                document.getElementById('timeSelect').innerHTML = tHtml;
                
                window.goToCurrentWeek();
                window.updateLoginUI();
            } catch(e) { console.error(e); }
        };

        init();
    </script>
</body>
</html>
